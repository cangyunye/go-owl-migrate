# Auto-generated by owl-migrate init
# Edit this file to fine-tune migration settings, then run:
#   owl-migrate validate -c ./migrate.yaml
#   owl-migrate gen-ddl  -c ./migrate.yaml
#   owl-migrate migrate  -c ./migrate.yaml

general:  # 通用日志设置
    log_level: info  # 日志级别: debug/info/warn/error
metadata:  # 【必填】元数据来源——表结构定义从哪里来
    type: csv  # 元数据类型: csv / xlsx / database
    csv:  # CSV 元数据加载器配置（type=csv 时生效）
        path: ./testdata/csv/
source:  # 源数据库连接（type=database 或 export/migrate 时使用）
    type: ""  # 源数据库方言: oracle/postgres/mysql/...
    dsn: ""  # 源数据库 DSN 连接串
    schema: ""  # 源 schema/数据库名（Oracle: 用户名; MySQL: db 名; PG: schema 名）
target:  # 目标数据库连接（import/migrate 时使用）
    type: postgres  # 目标数据库方言
    dsn: host=127.0.0.1 port=5432 user=postgres password=secret dbname=mydb sslmode=disable  # 目标数据库 DSN 连接串
    schema: pg  # 目标 schema/数据库名
ddl:  # DDL 生成器配置
    target_dialect: postgres  # 【必填】目标方言, 决定 CREATE TABLE / INSERT 语法
    include_comments: true  # 仅 gen-ddl: 是否生成 COMMENT ON 语句 (PG)
    include_if_not_exists: true  # 仅 gen-ddl/import: CREATE TABLE 是否加 IF NOT EXISTS
select_gen:  # SELECT 分页语句生成（仅 gen-select 命令使用）
    output_dir: ./output/select/  # 生成的 SELECT 语句输出目录
    batch:  # 分页设置
        method: cursor
        page_size: 5000
export:  # 数据导出配置（仅 export/migrate 命令使用）
    output_dir: ./output/data/  # 仅 export 独立运行时使用; migrate 用 --temp-dir
    format: csv  # 输出格式: 当前仅支持 csv
    csv:  # 导出 CSV 格式选项
        delimiter: ','
        quote_char: '"'
        header: true
        null_representation: \N
    batch:  # 批量读取设置
        page_size: 5000
    parallel:  # 并发设置
        enabled: true
        max_workers: 4
    tables:  # 表过滤规则
        include:
            - '*'
import:  # 数据导入配置（仅 import 命令使用）
    source_dir: ./output/data/  # CSV 数据目录（仅 import 命令使用；migrate 走 --temp-dir，gen-insert 走 -d/--data）
    format: csv  # 输入格式: 当前仅支持 csv
    csv:  # CSV 解析选项
        null_marker: \N
    target:  # 目标表写入策略
        truncate_before: true
    batch:  # 批次提交策略
        commit_interval: 1000
        error_policy: skip_row
    parallel:  # 并发设置
        enabled: true
        max_workers: 4
    data_transforms:  # 数据转换规则
        datetime_format: yyyyMMddHHmmss
        trim_strings: true
        null_if:
            - "NULL"
            - "null"
            - \N
