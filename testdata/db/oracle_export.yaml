general:
  log_level: debug
  log_format: text

metadata:
  type: csv
  csv:
    path: ./testdata/db/oracle/
    delimiter: ","
    encoding: utf-8
    has_header: true
    column_name_matching: case_insensitive

source:
  type: oracle
  dsn: "oracle://scott:tiger@127.0.0.1:1521/XEPDB1"

ddl:
  target_dialect: oracle

export:
  output_dir: ./output/data/oracle/
  format: csv
  csv:
    delimiter: ","
    quote_char: "\""
    encoding: utf-8
    header: true
    null_representation: "\\N"
    line_terminator: "\n"
  batch:
    method: cursor
    page_size: 5000
  parallel:
    enabled: false
    max_workers: 1
  tables:
    include: ["*"]
